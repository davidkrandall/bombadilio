/* ---- music theory: transpose for the Source-view + chord chips ---- */
const NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT2SHARP = { Db:"C#", Eb:"D#", Gb:"F#", Ab:"G#", Bb:"A#" };
function transpose(chord, semis) {
  if (!semis) return chord;
  const shift = (tok) => {
    const m = /^([A-G][#b]?)(.*)$/.exec(tok);
    if (!m) return tok;
    let root = m[1];
    root = FLAT2SHARP[root] || root;
    const i = NOTES.indexOf(root);
    if (i < 0) return tok;
    return NOTES[(i + semis) % 12] + m[2];
  };
  if (chord.includes("/")) {
    const [a, b] = chord.split("/");
    return shift(a) + "/" + shift(b);
  }
  return shift(chord);
}

/* Stable color per pitch-class so a given chord always reads the same hue.
   Tuned for a dark stage: bright, distinct, legible at a glance. */
const CHORD_HUES = {
  C:"#7CC4FF", "C#":"#5AA9FF",
  D:"#6FE3C2", "D#":"#46D6A8",
  E:"#B7E36F",
  F:"#F2D45C", "F#":"#F5BE3E",
  G:"#FF9F66", "G#":"#FF8A5C",
  A:"#FF7C9C", "A#":"#FF6FB5",
  B:"#C79BFF",
};
function chordColor(sym) {
  const m = /^([A-G][#b]?)/.exec(sym || "");
  let root = m ? m[1] : "C";
  root = FLAT2SHARP[root] || root;
  return CHORD_HUES[root] || "#E7E2D8";
}

async function loadJSON(key, fallback) {
  try {
    const raw = window.localStorage.getItem(key);
    if (raw != null) return JSON.parse(raw);
  } catch (e) { /* unavailable or unparseable */ }
  return fallback;
}
async function saveJSON(key, value) {
  try { window.localStorage.setItem(key, JSON.stringify(value)); }

/* ============================================================
   ChordLyricLine — chords on their OWN line above the lyric,
   larger and bolder, placed over the syllable where the change
   lands. Monospace grid keeps alignment exact.
   ============================================================ */
function ChordLyricLine({ line, semis }) {
  const lyric = line.lyric || "";
  const chords = line.chords || [];
  const annotations = line.annotations || [];

  if (line.chordsOnly || (!lyric.trim() && chords.length)) {
    return (
      <div className="cl-instrumental">
        {chords.map((c, i) => (
          <span key={i} className="cl-chip" style={{ color: chordColor(transpose(c.sym, semis)) }}>
            {transpose(c.sym, semis)}
          </span>
        ))}
      </div>
    );
  }

  if (!lyric.trim() && !chords.length) {
    return <div className="cl-spacer" />;
  }

  const N = Math.max(lyric.length, ...chords.map((c) => c.pos + 1), 0);
  const lyricCells = [];
  for (let i = 0; i < N; i++) {
    lyricCells.push(
      <span className="cl-char" key={i} style={{ whiteSpace: "pre" }}>
        {lyric[i] ?? " "}
      </span>
    );
  }

  const hasChords = chords.length > 0 || annotations.length > 0;

  return (
    <div className="cl-block">
      {hasChords && (
        <div className="cl-chordrow">
          {chords.map((c, i) => (
            <span
              key={"c" + i}
              className="cl-chord"
              style={{ left: c.pos + "ch", color: chordColor(transpose(c.sym, semis)) }}
            >
              {transpose(c.sym, semis)}
            </span>
          ))}
          {annotations.map((a, i) => (
            <span key={"a" + i} className="cl-ann" style={{ left: a.pos + "ch" }}>
              {a.text}
            </span>
          ))}
        </div>
      )}
      <div className="cl-lyricrow">{lyricCells}</div>
    </div>
  );
}

/* ============================================================
   KeyboardPanel — a simple dot read-out of the Casio CT-S1
   settings: which tone CATEGORY button and which TONE VARIATION
   (voicing) this song uses. One dot per option; the active one
   is filled red. Order matches the panel on the keyboard.
   ============================================================ */
const KBD_CATS = ["Piano","E.Piano 1","E.Piano 2","Organ","Keyboard","Synth","Others"];
const KBD_VOICINGS = ["Standard","Advanced","Modern","Vintage","Tone Memory"];
const norm = (s) => (s || "").trim().toLowerCase();
const DOT_ON = "🔴";   // 🔴
const DOT_OFF = "⚪️";  // ⚪️

function kbdDots(list, name, num) {
  let idx = list.findIndex((x) => norm(x) === norm(name));
  if (idx < 0 && num) idx = num - 1;            // fall back to the number
  return list.map((_, i) => (i === idx ? DOT_ON : DOT_OFF)).join("");
}

function KeyboardPanel({ kbd }) {
  return (
    <div className="kbd">
      <div className="kbd-row">
        <span className="kbd-dots">{kbdDots(KBD_CATS, kbd.instrument, kbd.instrumentNo)}</span>
        <span className="kbd-label">{kbd.instrument} ({kbd.instrumentNo})</span>
      </div>
      <div className="kbd-row">
        <span className="kbd-dots">{kbdDots(KBD_VOICINGS, kbd.voicing, kbd.voicingNo)}</span>
        <span className="kbd-label">{kbd.voicing} ({kbd.voicingNo})</span>
      </div>
    </div>
  );
}

function FullView({ song, semis }) {
  return (
    <div className="full">
      {song.sections.map((sec, si) => (
        <section className="sec" key={si}>
          <h3 className="sec-name">{sec.name}</h3>
          {sec.lines.length === 0 ? (
            <div className="sec-empty">— instrumental —</div>
          ) : (
            sec.lines.map((ln, li) => (
              <ChordLyricLine line={ln} semis={semis} key={li} />
            ))
          )}
        </section>
      ))}
    </div>
  );
}

/* ============================================================
   CHART view — grouped chord rows.
   Each lyric line becomes a row of chords. Identical adjacent
   rows collapse into "C F  x8". Distinct rows stack so changes
   read line by line.
   ============================================================ */
function groupRows(rows) {
  const out = [];
  for (const r of rows) {
    const key = r.join(" ");
    const last = out[out.length - 1];
    if (last && last.key === key) {
      last.count += 1;
    } else {
      out.push({ key, chords: r, count: 1 });
    }
  }
  return out;
}

function ChartView({ song, useWritten }) {
  return (
    <div className="chart">
      {song.cheat.map((sec, i) => {
        const rows = useWritten ? sec.rowsWritten : sec.rowsConcert;
        const grouped = groupRows(rows);
        return (
          <div className="chart-row" key={i}>
            <div className="chart-secname">{sec.name}</div>
            <div className="chart-body">
              {grouped.length === 0 ? (
                <div className="chart-line"><span className="chart-noch">&mdash;</span></div>
              ) : (
                grouped.map((g, j) => (
                  <div className="chart-line" key={j}>
                    <span className="chart-chords">
                      {g.chords.map((ch, k) => (
                        <span key={k} className="chart-chord" style={{ color: chordColor(ch) }}>
                          {ch}
                        </span>
                      ))}
                    </span>
                    {g.count > 1 && <span className="chart-count">&times;{g.count}</span>}
                  </div>
                ))
              )}
              {sec.cue && <div className="chart-cue">{sec.cue}&hellip;</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function SourceView({ song }) {
  return (
    <div className="source">
      {song.sections.map((sec, si) => (
        <section className="src-sec" key={si}>
          <div className="src-secname">{`{${sec.name}}`}</div>
          {sec.lines.length === 0 ? (
            <div className="src-empty">(instrumental)</div>
          ) : (
            sec.lines.map((ln, li) => {
              const lyric = ln.lyric || "";
              const marks = [
                ...(ln.chords || []).map((c) => ({ pos: c.pos, txt: `[${c.sym}]` })),
                ...(ln.annotations || []).map((a) => ({ pos: a.pos, txt: `[${a.text}]` })),
              ].sort((a, b) => a.pos - b.pos || 0);
              let out = "";
              let cursor = 0;
              marks.forEach((m) => {
                out += lyric.slice(cursor, m.pos) + m.txt;
                cursor = m.pos;
              });
              out += lyric.slice(cursor);
              return <div className="src-line" key={li}>{out || "\u00A0"}</div>;
            })
          )}
        </section>
      ))}
    </div>
  );
}

/* ============================================================
   App shell
   ============================================================ */
function App() {
  const songs = SONG_DATA.songs;
  const byId = React.useMemo(() => {
    const m = {}; songs.forEach((s) => (m[s.id] = s)); return m;
  }, [songs]);

  const [order, setOrder] = useState(songs.map((s) => s.id));
  const [capoPref, setCapoPref] = useState({}); // id -> show written capo shapes
  const [openId, setOpenId] = useState(null);
  const [view, setView] = useState("chart");

  useEffect(() => {
    (async () => {
      const savedOrder = await loadJSON(ORDER_KEY, null);
      if (Array.isArray(savedOrder)) {
        const known = new Set(songs.map((s) => s.id));
        const filtered = savedOrder.filter((id) => known.has(id));
        const missing = songs.map((s) => s.id).filter((id) => !filtered.includes(id));
        setOrder([...filtered, ...missing]);
      }
      const savedCapo = await loadJSON(CAPOPREF_KEY, {});
      if (savedCapo && typeof savedCapo === "object") setCapoPref(savedCapo);
    })();
  }, [songs]);

  const persistOrder = useCallback((next) => {
    setOrder(next);
    saveJSON(ORDER_KEY, next);
  }, []);

  const toggleCapo = useCallback((id) => {
    setCapoPref((prev) => {
      const next = { ...prev, [id]: !prev[id] };
      saveJSON(CAPOPREF_KEY, next);
      return next;
    });
  }, []);

  const move = (id, dir) => {
    const i = order.indexOf(id);
    const j = i + dir;
    if (j < 0 || j >= order.length) return;
    const next = [...order];
    [next[i], next[j]] = [next[j], next[i]];
    persistOrder(next);
  };

  const resetOrder = () => persistOrder(songs.map((s) => s.id));

  const openSong = byId[openId];
  const semisFor = (s) => (capoPref[s.id] ? 0 : (s.transpose || 0));

  return (
    <div className="app">
      <style>{CSS}</style>

      {!openSong && (
        <ListScreen
          order={order}
          byId={byId}
          onOpen={(id) => { setOpenId(id); setView("chart"); }}
          move={move}
          resetOrder={resetOrder}
        />
      )}

      {openSong && (
        <SongScreen
          song={openSong}
          view={view}
          setView={setView}
          onBack={() => setOpenId(null)}
          useWritten={!!capoPref[openSong.id]}
          toggleCapo={() => toggleCapo(openSong.id)}
          semis={semisFor(openSong)}
          position={order.indexOf(openSong.id) + 1}
          total={order.length}
          goRel={(d) => {
            const i = order.indexOf(openSong.id) + d;
            if (i >= 0 && i < order.length) { setOpenId(order[i]); setView("chart"); }
          }}
        />
      )}
    </div>
  );
}

/* ---- setlist screen ---- */
function ListScreen({ order, byId, onOpen, move, resetOrder }) {
  return (
    <div className="list-screen">
      <header className="masthead">
        <div className="mast-kicker">STAGE BOOK</div>
        <h1 className="mast-title">Bombadilio</h1>
        <div className="mast-sub">{order.length} songs &middot; use the arrows to set the order</div>
      </header>

      <ol className="setlist">
        {order.map((id, idx) => {
          const s = byId[id];
          const prev = idx > 0 ? byId[order[idx - 1]] : null;
          const showGroup = s.group && (!prev || prev.group !== s.group);
          return (
            <React.Fragment key={id}>
              {s.intermission && (
                <li className="set-divider" aria-hidden="true">
                  <span className="set-divider-label">Intermission</span>
                </li>
              )}
              {showGroup && (
                <li className="set-group" aria-hidden="true">{s.group}</li>
              )}
            <li className="song-item" onClick={() => onOpen(id)}>
              <span className="song-num">{idx + 1}</span>
              <span className="song-meta">
                <span className="song-title">{s.title}</span>
                <span className="song-tags">
                  {s.capo ? `capo ${s.capo}` : "no capo"}
                  {s.tempo ? ` \u00b7 ${s.tempo} bpm` : ""}
                  {s.originalArtist ? ` \u00b7 cover` : ""}
                  {s.keyboard ? ` \u00b7 \u2328 ${s.keyboard.instrument}` : ""}
                </span>
              </span>
              <span className="song-nudge" onClick={(e) => e.stopPropagation()}>
                <button className="nudge" aria-label="Move up" onClick={() => move(id, -1)}>&#9650;</button>
                <button className="nudge" aria-label="Move down" onClick={() => move(id, +1)}>&#9660;</button>
              </span>
            </li>
            </React.Fragment>
          );
        })}
      </ol>

      <div className="list-foot">
        <button className="ghost-btn" onClick={resetOrder}>Reset to original order</button>
      </div>
    </div>
  );
}

/* ---- single song screen ---- */
function SongScreen(props) {
  const { song, view, setView, onBack, useWritten, toggleCapo, semis, position, total, goRel } = props;
  const hasCapo = !!song.capo;
  const chordList = useWritten ? song.writtenChords : song.concertChords;

  return (
    <div className="song-screen">
      <header className="song-head">
        <button className="back-btn" onClick={onBack}>&lsaquo; Set</button>
        <div className="song-head-mid">
          <div className="song-head-pos">{position} / {total}</div>
          <h2 className="song-head-title">{song.title}</h2>
          <div className="song-head-sub">
            {hasCapo ? (
              <span className="capo-flag">Capo {song.capo}</span>
            ) : (
              <span className="capo-flag muted">No capo</span>
            )}
            {song.tempo && <span className="bpm-flag">{song.tempo} bpm</span>}
            {song.originalArtist && <span className="cover-flag">{song.originalArtist}</span>}
          </div>
        </div>
        <div className="song-head-nav">
          <button className="navarrow" onClick={() => goRel(-1)} disabled={position <= 1}>&lsaquo;</button>
          <button className="navarrow" onClick={() => goRel(1)} disabled={position >= total}>&rsaquo;</button>
        </div>
      </header>

      <div className="chordbar">
        <span className="chordbar-label">{useWritten ? "Shapes" : "Sounding"}</span>
        {chordList.map((c, i) => (
          <span key={i} className="chordbar-chip" style={{ color: chordColor(c) }}>{c}</span>
        ))}
        {hasCapo && (
          <button className={`capotoggle${useWritten ? " on" : ""}`} onClick={toggleCapo}>
            {useWritten ? "Guitar (capo shapes)" : "Piano (concert)"}
          </button>
        )}
      </div>

      <nav className="viewtabs">
        {["chart", "full", "source"].map((v) => (
          <button
            key={v}
            className={`viewtab${view === v ? " active" : ""}`}
            onClick={() => setView(v)}
          >
            {v === "chart" ? "Chart" : v === "full" ? "Full" : "Source"}
          </button>
        ))}
      </nav>

      <main className="song-body">
        {song.keyboard && <KeyboardPanel kbd={song.keyboard} />}
        {view === "chart" && <ChartView song={song} useWritten={useWritten} />}
        {view === "full" && <FullView song={song} semis={semis} />}
        {view === "source" && <SourceView song={song} />}
      </main>
    </div>
  );
}

const rootEl = document.getElementById("root");
rootEl.innerHTML = "";
ReactDOM.createRoot(rootEl).render(React.createElement(App));
  </script>
